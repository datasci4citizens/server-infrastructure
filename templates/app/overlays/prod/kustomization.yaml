apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: <NAMESPACE>

resources:
  - ../../base
# secret.yaml managed out-of-band (not in git). Apply once manually:
#   kubectl apply -f secret.yaml -n <NAMESPACE>

# Image tag updated by CI workflow on each build
images:
  - name: ghcr.io/<GH_USER_OR_ORG>/<APP_NAME>
    newTag: latest
