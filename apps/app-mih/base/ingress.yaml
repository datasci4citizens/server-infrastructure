apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-mih-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app-mih.ak8s.ic.unicamp.br
      secretName: app-mih-tls
  rules:
    - host: app-mih.ak8s.ic.unicamp.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-mih-service
                port:
                  number: 80
